<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>WebStar Analytics</title>
  <style>
    th {
      cursor: pointer;
      background-color: #f0f0f0;
    }
    th:hover {
      background-color: #d0d0d0;
    }

    .page-layout {
      display: flex;
      gap: 32px;
      align-items: flex-start;
    }

    .games-sidebar h3 {
      margin: 0 0 6px 0;
      font-size: 1em;
    }

    .wp-high {
      color: #1a7a1a;
      font-weight: bold;
    }
    .wp-low {
      color: #b30000;
    }
  </style>
  <link rel="apple-touch-icon" sizes="180x180" href="/website-assets/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/website-assets/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/website-assets/favicon-16x16.png">
  <link rel="manifest" href="/website-assets/site.webmanifest">
</head>
<body>

<h2>WebStar Analytics</h2>
<p id="last-updated" style="font-size: 0.9em; color: #555;">Last updated: —</p>

<div class="page-layout">

  <div>
    <table id="csvTable" border="1">
      <!-- Table will be populated here -->
    </table>
  </div>

  <div class="games-sidebar">
    <h3>Today's Games</h3>
    <table id="gamesTable" border="1">
      <thead>
        <tr id="gamesHeader"></tr>
      </thead>
      <tbody id="gamesBody">
        <tr><td colspan="6">Loading…</td></tr>
      </tbody>
    </table>
    <p style="font-style: italic; font-size: 0.85em; margin-top: 6px;">Neutral court indicated by italics</p>
  </div>

</div>

<script>
  // ── Rankings table ──────────────────────────────────────────────────────────
  const csvUrl = 'https://www.webstaranalytics.com/current_rankings.csv';

  fetch(`${csvUrl}?t=${Date.now()}`, { cache: 'no-store' })
    .then(response => {
      const lastModified = response.headers.get('Last-Modified');
      if (lastModified) {
        const date = new Date(lastModified);
        document.getElementById('last-updated').textContent =
          'Last updated: ' + date.toLocaleDateString() + ' ' + date.toLocaleTimeString();
      }
      return response.text();
    })
    .then(text => {
      const rows = text.trim().split('\n').map(r => r.split(','));

      const header = rows[0].map(h => h.trim());
      const dataRows = rows.slice(1);

      const dateColIndex = header.findIndex(h => h.toLowerCase() === 'date');
      if (dateColIndex === -1) {
        console.error("No 'Date' column found");
        return;
      }

      const normalizedDates = dataRows.map(r => normalizeDate(r[dateColIndex].trim()));
      const maxDate = normalizedDates.reduce((a, b) => (a > b ? a : b));

      const filteredRows = dataRows.filter((row, i) =>
        normalizeDate(row[dateColIndex].trim()) === maxDate
      );

      const table = document.getElementById('csvTable');
      table.innerHTML = '';

      const headerRow = document.createElement('tr');
      header.forEach((cell, colIndex) => {
        if (colIndex === dateColIndex) return;
        const th = document.createElement('th');
        th.textContent = cell;
        th.addEventListener('click', () => sortTable(table, colIndex));
        headerRow.appendChild(th);
      });
      table.appendChild(headerRow);

      filteredRows.forEach(row => {
        const tr = document.createElement('tr');
        row.forEach((cell, colIndex) => {
          if (colIndex === dateColIndex) return;
          const td = document.createElement('td');
          td.textContent = cell;
          tr.appendChild(td);
        });
        table.appendChild(tr);
      });
    })
    .catch(error => console.error('Error fetching CSV:', error));

  // ── Today's Games table ─────────────────────────────────────────────────────
  const gamesUrl = 'https://www.webstaranalytics.com/todays_games.csv';

  fetch(`${gamesUrl}?t=${Date.now()}`, { cache: 'no-store' })
    .then(r => r.text())
    .then(text => {
      const tbody = document.getElementById('gamesBody');
      const thead = document.getElementById('gamesHeader');

      const delimiter = text.includes('\t') ? '\t' : ',';
      const rows = text.trim().split('\n').map(r => r.split(delimiter).map(c => c.trim()));
      const header = rows[0];
      const dataRows = rows.slice(1);

      const col = name => header.findIndex(h => h.toLowerCase() === name.toLowerCase());

      const idxHome    = col('home_team');
      const idxAway    = col('away_team');
      const idxNeutral = col('is_neutral');
      const idxTime    = col('game_time');
      const idxTV      = col('tv_network');
      const idxSpread  = col('home_team_spread_display');
      const idxHomeWP  = col('home_team_wp');
      const idxAwayWP  = col('away_team_wp');

      thead.innerHTML = '';
      ['Game', 'Time (ET)', 'TV', 'WebStar Spread', 'Away WP%', 'Home WP%'].forEach((label, i) => {
        const th = document.createElement('th');
        th.textContent = label;
        th.addEventListener('click', () => sortGamesTable(i));
        thead.appendChild(th);
      });

      tbody.innerHTML = '';

      if (dataRows.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6">No games today.</td></tr>';
        return;
      }

      // Build row data objects so we can sort and re-render
      const gameRows = dataRows.map(row => {
        const homeTeam  = row[idxHome]   || '—';
        const awayTeam  = row[idxAway]   || '—';
        const isNeutral = (row[idxNeutral] || '').toLowerCase() === 'true' || row[idxNeutral] === '1';
        const gameTime  = row[idxTime]   || '';
        const tv        = row[idxTV]     || '—';
        const spreadRaw = row[idxSpread] ? row[idxSpread].trim() : null;
        const homeWPRaw = row[idxHomeWP] ? parseFloat(row[idxHomeWP]) : null;
        const awayWPRaw = row[idxAwayWP] ? parseFloat(row[idxAwayWP]) : null;

        // Convert game time to Eastern Time
        const { displayTime, sortMinutes } = convertToET(gameTime);

        // Determine spread display (PK for 0)
        let spreadText = '—';
        if (spreadRaw !== null) {
          const spreadNum = parseFloat(spreadRaw);
          if (!isNaN(spreadNum) && spreadNum === 0) {
            spreadText = 'PK';
          } else {
            spreadText = spreadRaw;
          }
        }

        return { homeTeam, awayTeam, isNeutral, displayTime, sortMinutes, tv, spreadText, homeWP: homeWPRaw, awayWP: awayWPRaw };
      });

      // Sort by time (earliest first) by default
      gameRows.sort((a, b) => a.sortMinutes - b.sortMinutes);

      renderGameRows(gameRows, tbody);

      // Attach sorting to the games table
      const gamesTable = document.getElementById('gamesTable');
      gamesTable._gameRows = gameRows;
      gamesTable._sortedCol = null;
    })
    .catch(err => {
      document.getElementById('gamesBody').innerHTML = '<tr><td colspan="6">Could not load games.</td></tr>';
      console.error('Error fetching games CSV:', err);
    });

  function renderGameRows(gameRows, tbody) {
    tbody.innerHTML = '';
    gameRows.forEach(g => {
      const tr = document.createElement('tr');

      // Game (away vs. home)
      const tdGame = document.createElement('td');
      tdGame.textContent = `${g.awayTeam} vs. ${g.homeTeam}`;
      if (g.isNeutral) tdGame.style.fontStyle = 'italic';
      tr.appendChild(tdGame);

      // Time (ET)
      const tdTime = document.createElement('td');
      tdTime.textContent = g.displayTime || '—';
      tr.appendChild(tdTime);

      // TV
      const tdTV = document.createElement('td');
      tdTV.textContent = g.tv;
      tr.appendChild(tdTV);

      // Spread
      const tdSpread = document.createElement('td');
      tdSpread.textContent = g.spreadText;
      tr.appendChild(tdSpread);

      // Away WP%
      const tdAwayWP = document.createElement('td');
      if (g.awayWP !== null) {
        tdAwayWP.textContent = g.awayWP.toFixed(1) + '%';
        tdAwayWP.className = g.awayWP >= 50 ? 'wp-high' : 'wp-low';
      } else {
        tdAwayWP.textContent = '—';
      }
      tr.appendChild(tdAwayWP);

      // Home WP%
      const tdHomeWP = document.createElement('td');
      if (g.homeWP !== null) {
        tdHomeWP.textContent = g.homeWP.toFixed(1) + '%';
        tdHomeWP.className = g.homeWP >= 50 ? 'wp-high' : 'wp-low';
      } else {
        tdHomeWP.textContent = '—';
      }
      tr.appendChild(tdHomeWP);

      tbody.appendChild(tr);
    });
  }

  function sortGamesTable(colIndex) {
    const gamesTable = document.getElementById('gamesTable');
    const gameRows = gamesTable._gameRows;
    if (!gameRows) return;

    const tbody = document.getElementById('gamesBody');
    const colKeys = ['awayTeam', 'sortMinutes', 'tv', 'spreadText', 'awayWP', 'homeWP'];
    const key = colKeys[colIndex];

    const isNumericKey = ['sortMinutes', 'awayWP', 'homeWP'].includes(key);

    gameRows.sort((a, b) => {
      const aVal = a[key] ?? (isNumericKey ? Infinity : '');
      const bVal = b[key] ?? (isNumericKey ? Infinity : '');
      if (isNumericKey) return aVal - bVal;
      return String(aVal).localeCompare(String(bVal));
    });

    if (gamesTable._sortedCol === colIndex) {
      gameRows.reverse();
      gamesTable._sortedCol = null;
    } else {
      gamesTable._sortedCol = colIndex;
    }

    renderGameRows(gameRows, tbody);
  }

  /**
   * Convert a time string to Eastern Time.
   * Handles formats like "7:00 PM ET", "7:00 PM CT", "19:00", "7:00 PM", etc.
   * Returns { displayTime: "7:00 PM ET", sortMinutes: 1140 }
   */
  function convertToET(timeStr) {
    if (!timeStr || timeStr === '—') return { displayTime: timeStr, sortMinutes: Infinity };

    // Timezone offset from ET (hours to ADD to convert to ET)
    const tzOffsets = {
      'ET': 0, 'EST': 0, 'EDT': 0,
      'CT': 1, 'CST': 1, 'CDT': 1,
      'MT': 2, 'MST': 2, 'MDT': 2,
      'PT': 3, 'PST': 3, 'PDT': 3,
    };

    // Match patterns like "7:00 PM CT" or "19:00 CT" or "7:00 PM" or "7:00"
    const match = timeStr.trim().match(/^(\d{1,2}):(\d{2})\s*(AM|PM)?\s*([A-Z]{2,3})?$/i);
    if (!match) return { displayTime: timeStr, sortMinutes: Infinity };

    let hours = parseInt(match[1], 10);
    const minutes = parseInt(match[2], 10);
    const ampm = match[3] ? match[3].toUpperCase() : null;
    const tz = match[4] ? match[4].toUpperCase() : 'ET';

    // Convert 12-hour to 24-hour
    if (ampm === 'PM' && hours !== 12) hours += 12;
    if (ampm === 'AM' && hours === 12) hours = 0;

    // Apply offset to convert to ET
    const offset = tzOffsets[tz] !== undefined ? tzOffsets[tz] : 0;
    let totalMinutes = hours * 60 + minutes + offset * 60;

    // Handle day wrap
    totalMinutes = ((totalMinutes % 1440) + 1440) % 1440;

    const etHours24 = Math.floor(totalMinutes / 60);
    const etMinutes = totalMinutes % 60;

    // Format back to 12-hour with AM/PM
    let displayHours = etHours24 % 12;
    if (displayHours === 0) displayHours = 12;
    const displayAmPm = etHours24 >= 12 ? 'PM' : 'AM';
    const displayTime = `${displayHours}:${String(etMinutes).padStart(2, '0')} ${displayAmPm} ET`;

    return { displayTime, sortMinutes: totalMinutes };
  }

  // ── Utilities ───────────────────────────────────────────────────────────────
  function normalizeDate(d) {
    const date = new Date(d);
    if (isNaN(date)) return '';
    return date.toISOString().split('T')[0];
  }

  function sortTable(table, colIndex) {
    const rowsArray = Array.from(table.rows).slice(1);
    const isNumeric = !isNaN(rowsArray[0].cells[colIndex].textContent);

    rowsArray.sort((a, b) => {
      let aText = a.cells[colIndex].textContent;
      let bText = b.cells[colIndex].textContent;
      return isNumeric
        ? parseFloat(aText) - parseFloat(bText)
        : aText.localeCompare(bText);
    });

    if (table.sortedCol === colIndex) {
      rowsArray.reverse();
      table.sortedCol = null;
    } else {
      table.sortedCol = colIndex;
    }

    rowsArray.forEach(row => table.appendChild(row));
  }
</script>

</body>
</html>
